<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{fragments/plantilla_base}">
<head>
    <title>Mis Tareas - Agenda</title>
    <!-- CSS específico inyectado para esta vista -->
    <style layout:fragment="css">
        .task-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 20px;
        }

        .task-card {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 16px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.6);
        }

        .task-content {
            flex: 1;
            margin-left: 12px;
        }

        .task-title {
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .task-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-color);
            width: 100%;
            max-width: 500px;
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.5);
            font-family: inherit;
        }

        /* Toast Styles */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success { background: #2ecc71; }
        .toast-error { background: #e74c3c; }

        /* Skeleton Loader */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div layout:fragment="contenido">
        
        <!-- Cabecera de la sección -->
        <div class="dashboard-header">
            <div>
                <h2>Gestión de Tareas</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Organiza tu día de forma eficiente</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()"><i class="ph ph-plus"></i> Nueva Tarea</button>
        </div>

        <!-- Filtros -->
        <div class="glass-panel" style="padding: 16px; border-radius: var(--radius-md); margin-bottom: 20px; display: flex; gap: 16px;">
            <div style="flex: 1;">
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar tarea..." onkeyup="filterTasks()">
            </div>
            <div>
                <select id="filterPriority" class="form-control" onchange="filterTasks()">
                    <option value="ALL">Todas las prioridades</option>
                    <option value="HIGH">Alta</option>
                    <option value="MEDIUM">Media</option>
                    <option value="LOW">Baja</option>
                </select>
            </div>
            <div>
                <select id="filterStatus" class="form-control" onchange="filterTasks()">
                    <option value="ALL">Todos los estados</option>
                    <option value="PENDING">Pendientes</option>
                    <option value="COMPLETED">Completadas</option>
                </select>
            </div>
        </div>

        <!-- Contenedor dinámico donde se cargarán las tareas con Fetch API -->
        <div id="tasksContainer" class="task-grid">
            <!-- Skeleton Loader (mostrado mientras carga) -->
            <div class="task-card">
                <div class="skeleton" style="width: 24px; height: 24px; border-radius: 4px;"></div>
                <div class="task-content">
                    <div class="skeleton" style="width: 60%; height: 20px; margin-bottom: 8px;"></div>
                    <div class="skeleton" style="width: 40%; height: 14px;"></div>
                </div>
            </div>
        </div>

        <!-- Modal para Crear/Editar Tarea -->
        <div id="taskModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Nueva Tarea</h3>
                    <button class="icon-btn" onclick="closeModal()"><i class="ph ph-x"></i></button>
                </div>
                
                <form id="taskForm" onsubmit="saveTask(event)">
                    <!-- Campo oculto para el ID al editar -->
                    <input type="hidden" id="taskId">
                    
                    <div class="form-group">
                        <label>Título <span style="color:red">*</span></label>
                        <input type="text" id="taskTitle" class="form-control" required maxlength="100" placeholder="Ej: Comprar leche">
                        <small id="error-title" style="color: red; display: none;"></small>
                    </div>
                    
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="taskDesc" class="form-control" rows="3" placeholder="Detalles de la tarea..."></textarea>
                    </div>
                    
                    <div style="display: flex; gap: 16px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Prioridad</label>
                            <select id="taskPriority" class="form-control">
                                <option value="LOW">Baja</option>
                                <option value="MEDIUM" selected>Media</option>
                                <option value="HIGH">Alta</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Fecha Límite (Opcional)</label>
                            <input type="datetime-local" id="taskDueDate" class="form-control">
                        </div>
                    </div>
                    
                    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px;">
                        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar Tarea</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Contenedor para Notificaciones (Toasts) -->
        <div id="toastContainer" class="toast-container"></div>

    </div>

    <!-- Scripts de la vista -->
    <th:block layout:fragment="scripts">
        <script>
            // Variable global para almacenar tareas y poder filtrarlas sin llamar al servidor
            let allTasks = [];

            // ==========================================
            // ON LOAD
            // ==========================================
            document.addEventListener('DOMContentLoaded', () => {
                fetchTasks();
            });

            // ==========================================
            // FETCH API - OBTENER TAREAS
            // ==========================================
            async function fetchTasks() {
                try {
                    const response = await fetch('/api/tasks');
                    if (!response.ok) throw new Error('Error al cargar tareas');
                    allTasks = await response.json();
                    renderTasks(allTasks);
                } catch (error) {
                    showToast('Error de conexión', 'error');
                    document.getElementById('tasksContainer').innerHTML = '<p style="color: red;">Error al cargar las tareas.</p>';
                }
            }

            // ==========================================
            // RENDERIZAR TAREAS (UI)
            // ==========================================
            function renderTasks(tasks) {
                const container = document.getElementById('tasksContainer');
                container.innerHTML = '';

                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="glass-panel" style="padding: 40px; text-align: center; color: var(--text-secondary);">
                            <i class="ph ph-check-square" style="font-size: 3rem; opacity: 0.5;"></i>
                            <p style="margin-top: 10px;">No hay tareas disponibles.</p>
                        </div>`;
                    return;
                }

                tasks.forEach(task => {
                    const badgeClass = task.priority === 'HIGH' ? 'badge-high' : task.priority === 'MEDIUM' ? 'badge-medium' : 'badge-low';
                    const badgeText = task.priority === 'HIGH' ? 'Alta' : task.priority === 'MEDIUM' ? 'Media' : 'Baja';
                    
                    const dateText = task.dueDate ? new Date(task.dueDate).toLocaleString('es-ES', {day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit'}) : 'Sin fecha';
                    const textClass = task.isCompleted ? 'task-title completed' : 'task-title';

                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.innerHTML = `
                        <label class="custom-checkbox">
                            <input type="checkbox" onchange="toggleTaskStatus(${task.id}, this.checked)" ${task.isCompleted ? 'checked' : ''}>
                            <span class="checkmark"></span>
                        </label>
                        <div class="task-content">
                            <div class="${textClass}" style="${task.isCompleted ? 'text-decoration: line-through; opacity: 0.6;' : ''}">${escapeHtml(task.title)}</div>
                            ${task.description ? `<div class="task-desc">${escapeHtml(task.description)}</div>` : ''}
                            <div class="task-meta">
                                <span><i class="ph ph-clock"></i> ${dateText}</span>
                                <span class="badge ${badgeClass}">${badgeText}</span>
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="icon-btn" onclick="editTask(${task.id})" title="Editar"><i class="ph ph-pencil-simple"></i></button>
                            <button class="icon-btn" onclick="deleteTask(${task.id})" title="Eliminar" style="color: var(--danger-color);"><i class="ph ph-trash"></i></button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            // ==========================================
            // FILTROS FRONTEND
            // ==========================================
            function filterTasks() {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const priority = document.getElementById('filterPriority').value;
                const status = document.getElementById('filterStatus').value;

                const filtered = allTasks.filter(task => {
                    const matchSearch = task.title.toLowerCase().includes(search) || (task.description && task.description.toLowerCase().includes(search));
                    const matchPriority = priority === 'ALL' || task.priority === priority;
                    const matchStatus = status === 'ALL' || (status === 'COMPLETED' && task.isCompleted) || (status === 'PENDING' && !task.isCompleted);
                    
                    return matchSearch && matchPriority && matchStatus;
                });

                renderTasks(filtered);
            }

            // ==========================================
            // GUARDAR (CREAR O ACTUALIZAR)
            // ==========================================
            async function saveTask(event) {
                event.preventDefault(); // Evitar que el formulario recargue la página
                
                // Limpiar errores previos
                document.getElementById('error-title').style.display = 'none';

                const id = document.getElementById('taskId').value;
                const isUpdate = id !== "";

                const dto = {
                    title: document.getElementById('taskTitle').value,
                    description: document.getElementById('taskDesc').value,
                    priority: document.getElementById('taskPriority').value,
                    dueDate: document.getElementById('taskDueDate').value ? document.getElementById('taskDueDate').value : null,
                    isCompleted: isUpdate ? allTasks.find(t => t.id == id).isCompleted : false
                };

                const url = isUpdate ? `/api/tasks/${id}` : '/api/tasks';
                const method = isUpdate ? 'PUT' : 'POST';

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json'
                            // Spring Security CSRF - si está habilitado requeriría un token, pero lo deshabilitamos en config o Thymeleaf lo maneja.
                            // Para peticiones AJAX puras en Thymeleaf a veces hay que inyectarlo, pero veamos si funciona sin él primero.
                        },
                        body: JSON.stringify(dto)
                    });

                    if (!response.ok) {
                        if (response.status === 400) {
                            const errorData = await response.json();
                            // Mostrar errores de validación de Spring Boot (@Valid)
                            if (errorData.validationErrors && errorData.validationErrors.title) {
                                document.getElementById('error-title').innerText = errorData.validationErrors.title;
                                document.getElementById('error-title').style.display = 'block';
                            } else {
                                showToast(errorData.message || 'Datos inválidos', 'error');
                            }
                            return;
                        }
                        throw new Error('Error en el servidor');
                    }

                    showToast(isUpdate ? 'Tarea actualizada' : 'Tarea creada', 'success');
                    closeModal();
                    fetchTasks(); // Recargar lista
                } catch (error) {
                    showToast('Hubo un problema al guardar', 'error');
                }
            }

            // ==========================================
            // COMPLETAR TAREA
            // ==========================================
            async function toggleTaskStatus(id, isCompleted) {
                const task = allTasks.find(t => t.id === id);
                if (!task) return;

                const dto = {
                    title: task.title,
                    description: task.description,
                    priority: task.priority,
                    dueDate: task.dueDate,
                    isCompleted: isCompleted
                };

                try {
                    const response = await fetch(`/api/tasks/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dto)
                    });
                    if (response.ok) {
                        task.isCompleted = isCompleted; // Actualizar localmente rápido
                        filterTasks(); // Re-render
                        showToast(isCompleted ? '¡Tarea completada!' : 'Tarea pendiente', 'success');
                    }
                } catch (e) {
                    showToast('Error al actualizar estado', 'error');
                }
            }

            // ==========================================
            // ELIMINAR TAREA
            // ==========================================
            async function deleteTask(id) {
                if (!confirm("¿Estás seguro de que deseas eliminar esta tarea?")) return;

                try {
                    const response = await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        showToast('Tarea eliminada', 'success');
                        fetchTasks(); // Recargar lista real de BD
                    } else {
                        showToast('Error al eliminar', 'error');
                    }
                } catch (e) {
                    showToast('Error de red', 'error');
                }
            }

            // ==========================================
            // MODAL Y UTILIDADES
            // ==========================================
            function openModal() {
                document.getElementById('taskForm').reset();
                document.getElementById('taskId').value = "";
                document.getElementById('modalTitle').innerText = "Nueva Tarea";
                document.getElementById('error-title').style.display = 'none';
                document.getElementById('taskModal').classList.add('active');
            }

            function closeModal() {
                document.getElementById('taskModal').classList.remove('active');
            }

            function editTask(id) {
                const task = allTasks.find(t => t.id === id);
                if (!task) return;

                document.getElementById('taskId').value = task.id;
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDesc').value = task.description || '';
                document.getElementById('taskPriority').value = task.priority;
                
                // Formatear fecha para el input datetime-local
                if (task.dueDate) {
                    const date = new Date(task.dueDate);
                    date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
                    document.getElementById('taskDueDate').value = date.toISOString().slice(0,16);
                } else {
                    document.getElementById('taskDueDate').value = '';
                }

                document.getElementById('modalTitle').innerText = "Editar Tarea";
                document.getElementById('taskModal').classList.add('active');
            }

            // Toast system
            function showToast(message, type = 'success') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.innerHTML = `<i class="ph ${type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'}"></i> ${message}`;
                
                container.appendChild(toast);
                
                // Animar entrada
                setTimeout(() => toast.classList.add('show'), 10);
                
                // Remover después de 3s
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            // Evitar inyección HTML (XSS)
            function escapeHtml(unsafe) {
                return unsafe
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            }
        </script>
    </th:block>
</body>
</html>
