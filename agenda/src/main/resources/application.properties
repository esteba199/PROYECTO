# Nombre de la aplicación Spring Boot
spring.application.name=interactiva

# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS (MySQL)
# ==========================================
# Se definen valores por defecto con variables de entorno para que el usuario pueda
# personalizar sus credenciales sin romper la configuración del proyecto.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:agenda_inteligente}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate JPA
# 'update' creará o actualizará las tablas en la base de datos de manera automática
# al iniciar la aplicación basándose en nuestras clases de entidad en Java.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# CONFIGURACIÓN DE SEGURIDAD Y JWT
# ==========================================
# Llave secreta para firmar los tokens JWT. Debe ser de al menos 256 bits (32 caracteres).
# Por defecto proveemos una clave secreta segura para desarrollo.
jwt.secret=45a29e66fcf11f28330b0c10c5c6c7ffffff45a29e66fcf11f28330b0c10c5c6c7ffffff
# Tiempo de expiración del token en milisegundos (ej: 86400000 ms = 24 horas)
jwt.expiration=86400000

# ==========================================
# CONFIGURACIÓN DE CORREO (SMTP MAILJET)
# ==========================================
# Mailjet permite enviar correos configurando su servidor SMTP.
# El usuario debe rellenar estas variables con sus credenciales de Mailjet.
spring.mail.host=in-v3.mailjet.com
spring.mail.port=587
spring.mail.username=${MAILJET_API_KEY:su_api_key_aqui}
spring.mail.password=${MAILJET_SECRET_KEY:su_secret_key_aqui}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Correo electrónico remitente verificado en Mailjet
app.mail.sender=${MAILJET_SENDER_EMAIL:no-reply@agendainteligente.com}

# ==========================================
# CONFIGURACIÓN DE SWAGGER / OPENAPI
# ==========================================
# Define los endpoints donde se encontrará la documentación interactiva de la API
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Habilitar el procesamiento de tareas programadas (@Scheduled)
spring.task.scheduling.pool.size=2
